name: Build and Deploy Frontend

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 232234253204.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: midnight-bites-frontend
  EKS_PRODUCTION_REPO: Pratikbhosale7491/eks-production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: | 
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update image tag in eks-production
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git clone https://$GIT_TOKEN@github.com/$EKS_PRODUCTION_REPO.git
          cd eks-production
          sed -i "s|$ECR_REGISTRY/$ECR_REPOSITORY:.*|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" apps/mb-frontend/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "ci: update mb-frontend image to $IMAGE_TAG"
          git push